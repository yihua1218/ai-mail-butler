name: Docker Publish

on:
  push:
    branches: [ "main", "master" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist/

  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: 
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5

      - name: Log build machine specs
        run: |
          echo "=== Build Machine Hardware ==="
          echo "CPU Model   : $(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)"
          echo "CPU Cores   : $(nproc)"
          echo "Total RAM   : $(awk '/MemTotal/{printf "%.1f GiB\n", $2/1024/1024}' /proc/meminfo)"
          echo "Root Disk   : $(df -BG / | awk 'NR==2{print $2}')"
          echo "Runner OS   : $(uname -a)"
          echo "=============================="

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build backend
        run: cross build --release --target ${{ matrix.target }}
      - name: Upload backend artifact
        uses: actions/upload-artifact@v5
        with:
          name: backend-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ai-mail-butler

  build-docker:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download frontend artifact
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Download amd64 backend
        uses: actions/download-artifact@v5
        with:
          name: backend-x86_64-unknown-linux-gnu
          path: bin/amd64

      - name: Download arm64 backend
        uses: actions/download-artifact@v5
        with:
          name: backend-aarch64-unknown-linux-gnu
          path: bin/arm64

      - name: Make binaries executable
        run: chmod +x bin/amd64/ai-mail-butler bin/arm64/ai-mail-butler

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
