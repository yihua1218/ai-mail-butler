version: '3.8'

services:
  ai-mail-butler:
    image: ${IMAGE_NAME:-ghcr.io/yihua/ai-mail-butler}:${IMAGE_TAG:-latest}
    build: .
    container_name: ai-mail-butler
    ports:
      - "3000:3000"
      - "25:25"
    env_file:
      - .env
    volumes:
      - ./ai-mail-butler-data:/app/data
    restart: unless-stopped
